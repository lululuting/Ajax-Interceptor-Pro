<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajax Interceptor Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-title">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.07-.12C8.48 10.94 10.42 7.54 13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21z"/></svg>
      <span>Ajax Interceptor Pro</span>
    </div>
    <div class="header-actions">
      <label class="toggle-btn" title="全局开关">
        <input type="checkbox" id="globalToggle">
        <span class="toggle-track"><span class="toggle-knob"></span></span>
      </label>
      <button class="btn-icon" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="searchInput" placeholder="搜索接口...">
        </div>
      </div>
      <div class="group-list" id="groupList"></div>
      <div class="sidebar-footer">
        <button class="btn sec btn-block" id="newGroupBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          新建分组
        </button>
      </div>
    </aside>

    <main class="content">
      <div class="content-header">
        <h2 id="currentGroupName">全部规则</h2>
        <span class="rule-count" id="ruleCount">0 条规则</span>
      </div>
      <div class="rule-list" id="ruleList"></div>
      <div class="content-footer">
        <button class="btn pri" id="newRuleBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          添加规则
        </button>
        <div class="spacer"></div>
        <button class="btn sec" id="importBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
          导入
        </button>
        <button class="btn sec" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          导出
        </button>
      </div>
    </main>
  </div>
</div>

<!-- Group Modal -->
<div class="modal" id="groupModal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-head">
      <h3 id="groupModalTitle">新建分组</h3>
      <button class="close-btn" onclick="closeM('groupModal')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>分组名称</label>
        <input type="text" id="groupNameInput" placeholder="例如：用户模块">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn sec" onclick="closeM('groupModal')">取消</button>
      <button class="btn pri" id="saveGroupBtn">确认</button>
    </div>
  </div>
</div>

<!-- Rule Modal -->
<div class="modal" id="ruleModal">
  <div class="modal-overlay"></div>
  <div class="modal-content lg">
    <div class="modal-head">
      <h3 id="ruleModalTitle">添加规则</h3>
      <button class="close-btn" onclick="closeM('ruleModal')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>请求方法</label>
          <select id="ruleMethod">
            <option value="*">全部</option>
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
            <option value="PATCH">PATCH</option>
          </select>
        </div>
        <div class="form-group grow2">
          <label>URL 匹配模式</label>
          <input type="text" id="ruleUrl" placeholder="/api/user/* 或 *.json">
        </div>
      </div>
      <div class="form-group">
        <label>所属分组</label>
        <select id="ruleGroup"></select>
      </div>
      <div class="form-group">
        <label>返回数据 (JSON)</label>
        <textarea id="ruleResponse" placeholder='{"code": 0, "data": {}}'></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>HTTP 状态码</label>
          <input type="number" id="ruleStatus" value="200" min="100" max="599">
        </div>
        <div class="form-group checkbox" style="align-self:flex-end;padding-bottom:10px;">
          <input type="checkbox" id="ruleEnabled" checked>
          <span>立即启用</span>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn sec" onclick="closeM('ruleModal')">取消</button>
      <button class="btn pri" id="saveRuleBtn">保存</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal" id="exportModal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-head">
      <h3>导出数据</h3>
      <button class="close-btn" onclick="closeM('exportModal')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="radio-group">
        <label class="radio"><input type="radio" name="exportScope" value="all" checked><span>导出全部</span></label>
        <label class="radio"><input type="radio" name="exportScope" value="current"><span>仅导出当前分组</span></label>
        <label class="radio"><input type="radio" name="exportScope" value="selected"><span>导出选中分组</span></label>
      </div>
      <div class="checkbox-list" id="exportGroupList" style="display:none;margin-top:12px;padding:12px;background:var(--bg2);border-radius:var(--radius);max-height:120px;overflow-y:auto;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn sec" onclick="closeM('exportModal')">取消</button>
      <button class="btn pri" id="confirmExportBtn">导出 JSON</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal" id="importModal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-head">
      <h3>导入数据</h3>
      <button class="close-btn" onclick="closeM('importModal')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="file-drop" id="fileDropZone">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        <p>点击或拖拽文件到此处</p>
        <p class="muted">支持 .json 格式</p>
        <input type="file" id="importFile" accept=".json" hidden>
      </div>
      <div class="radio-group" style="margin-top:16px;">
        <label style="font-size:12px;color:var(--text2);margin-bottom:8px;display:block;">导入策略：</label>
        <label class="radio"><input type="radio" name="importStrategy" value="merge" checked><span>合并（提示冲突）</span></label>
        <label class="radio"><input type="radio" name="importStrategy" value="overwrite"><span>覆盖（清空现有）</span></label>
        <label class="radio"><input type="radio" name="importStrategy" value="skip"><span>仅新增（跳过重复）</span></label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn sec" onclick="closeM('importModal')">取消</button>
      <button class="btn pri" id="confirmImportBtn" disabled>确认导入</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal" id="confirmModal">
  <div class="modal-overlay"></div>
  <div class="modal-content sm">
    <div class="modal-head">
      <h3 id="confirmTitle">确认</h3>
    </div>
    <div class="modal-body">
      <p id="confirmMessage">确定要执行此操作吗？</p>
    </div>
    <div class="modal-foot">
      <button class="btn sec" onclick="closeM('confirmModal')">取消</button>
      <button class="btn danger" id="confirmActionBtn">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMessage"></span></div>
<script src="popup.js"></script>
</body>
</html>
