<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajax Interceptor Pro</title>
  <link rel="stylesheet" href="popup/popup.css">
  <style>
    /* 禁止横向滚动条 */
    html, body { overflow-x: hidden; max-width: 100vw; width: 100%; height: 100%; }
    body { width: 100% !important; height: 100vh !important; }
    .app { overflow-x: hidden; min-height: 100vh; }
    .modal-content { max-width: 100%; box-sizing: border-box; }
  </style>
  <script id="_monaco_loader" src="libs/vs/loader.js" data-vs="libs/vs"></script>
  <script src="libs/monaco-editor.js"></script>
  <script src="libs/mode-config.js"></script>
  <script src="libs/shared-ui.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">
        <span class="logo">⚡</span>
        <span>Ajax Interceptor Pro</span>
      </div>
      <div class="header-actions">
        <label class="group-toggle" title="全局开关">
          <input type="checkbox" id="globalToggle">
          <span class="toggle-slider"></span>
        </label>
        <button class="btn-icon" id="settingsBtn" title="设置">⚙️</button>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索接口...">
          </div>
        </div>
        <div class="group-list" id="groupList"></div>
        <div class="sidebar-footer">
          <button class="btn btn-secondary btn-block" id="newGroupBtn">➕ 新建分组</button>
        </div>
      </aside>

      <main class="content">
        <div class="content-header">
          <h2 id="currentGroupName">全部规则</h2>
          <span class="rule-count" id="ruleCount">0 条规则</span>
        </div>
        <div class="rule-list" id="ruleList"></div>
        <div class="content-footer">
          <button class="btn btn-primary" id="newRuleBtn">➕ 添加规则</button>
          <div class="spacer"></div>
          <button class="btn btn-secondary" id="importBtn">📥 导入</button>
          <button class="btn btn-secondary" id="exportBtn">📤 导出</button>
        </div>
      </main>
    </div>
  </div>

  <!-- Group Modal -->
  <div class="modal" id="groupModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="groupModalTitle">新建分组</h3>
        <button class="close-btn" data-close="groupModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>分组名称</label>
          <input type="text" id="groupNameInput" placeholder="例如：用户模块">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="groupModal">取消</button>
        <button class="btn btn-primary" id="saveGroupBtn">确认</button>
      </div>
    </div>
  </div>

  <!-- Rule Modal -->
  <div class="modal" id="ruleModal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h3 id="ruleModalTitle">添加规则</h3>
        <button class="close-btn" data-close="ruleModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group flex-2">
            <label>规则名称</label>
            <input type="text" id="ruleName" placeholder="给规则起个名字（可选）">
          </div>
          <div class="form-group">
            <label>请求方法</label>
            <select id="ruleMethod">
              <option value="*">全部</option>
              <option value="GET">GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="DELETE">DELETE</option>
              <option value="PATCH">PATCH</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>URL 匹配模式</label>
          <input type="text" id="ruleUrl" placeholder="/api/user/*">
        </div>
        <div class="form-group">
          <label>所属分组</label>
          <select id="ruleGroup"></select>
        </div>
        <div class="form-group">
          <label>返回数据 (JSON)</label>
          <div class="monaco-editor-container"></div>
        </div>
        <div class="form-row rule-options-row">
          <div class="rule-status-wrap">
            <label>状态码</label>
            <div class="rule-status-input">
              <input type="number" id="ruleStatus" value="200" min="100" max="599">
            </div>
          </div>
          <div class="rule-enable-wrap">
            <label class="switch-label">
              <input type="checkbox" id="ruleEnabled" checked>
              <span class="switch-track"></span>
              <span class="switch-text">立即启用</span>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="ruleModal">取消</button>
        <button class="btn btn-primary" id="saveRuleBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚙️ 设置</h3>
        <button class="close-btn" data-close="settingsModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <div class="settings-section-title">启动模式</div>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="openMode" value="popup" checked>
              <span>弹窗模式</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="openMode" value="devtools">
              <span>DevTools 面板</span>
            </label>
          </div>
          <p style="color:var(--text3);font-size:11px;margin-top:8px;padding:8px;background:var(--bg);border-radius:8px;">
            💡 DevTools 模式：按 F12 打开开发者工具，在「Ajax拦截」标签页使用
          </p>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">外观</div>
          <div class="settings-item">
            <div>
              <div class="settings-item-label">显示命中计数</div>
            </div>
            <label class="group-toggle">
              <input type="checkbox" id="showHitCount" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">数据</div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-secondary" id="exportConfigBtn">📤 导出配置</button>
            <button class="btn btn-secondary" id="clearDataBtn" style="color:#ef4444;">🗑️ 清除数据</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">关于</div>
          <div style="color:var(--text2);font-size:12px;">
            <p><strong>版本:</strong> 2.1.0</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-close="settingsModal">完成</button>
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div class="modal" id="exportModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>导出数据</h3>
        <button class="close-btn" data-close="exportModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="exportScope" value="all" checked>
            <span>导出全部</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="exportScope" value="current">
            <span>仅导出当前分组</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="exportModal">取消</button>
        <button class="btn btn-primary" id="confirmExportBtn">导出</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal" id="importModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>导入数据</h3>
        <button class="close-btn" data-close="importModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="file-drop-zone" id="fileDropZone">
          <div class="file-drop-content">
            <span class="icon">📄</span>
            <p>点击或拖拽文件到此处</p>
            <p class="text-muted">支持 .json 格式</p>
            <input type="file" id="importFile" accept=".json" hidden>
          </div>
        </div>
        <div class="radio-group" style="margin-top:16px;">
          <label style="font-size:12px;color:var(--text2);margin-bottom:8px;display:block;">导入策略：</label>
          <label class="radio-label">
            <input type="radio" name="importStrategy" value="merge" checked>
            <span>合并</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="importStrategy" value="overwrite">
            <span>覆盖</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="importModal">取消</button>
        <button class="btn btn-primary" id="confirmImportBtn" disabled>导入</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal" id="confirmModal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3 id="confirmTitle">确认</h3>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="confirmModal">取消</button>
        <button class="btn btn-danger" id="confirmActionBtn">确定</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none;"><span id="toastMessage"></span></div>
  <script src="devtools-panel.js"></script>
</body>
</html>
